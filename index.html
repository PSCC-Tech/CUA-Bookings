<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUA Bookings</title>
    <!--<link rel="stylesheet" href="styles.css">-->
    <link rel="stylesheet" href="CSS/base.css">
    <link rel="stylesheet" href="CSS/index.css">
    <link rel="stylesheet" href="CSS/courses.css"> <!-- For filter button -->
    <link rel="stylesheet" href="CSS/calendar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="container">

        <!-- LEFT NAVIGATION -->
        <nav class="sidebar">
            <h2 class="logo">CUA Bookings</h2>

            <ul class="nav-links">
                <li class="active">Bookings</li>
                <li onclick="window.location='courses.html'">Courses</li>
                <li onclick="window.location='mentors.html'">Mentors</li>
                <li onclick="window.location='account.html'">Account</li>
            </ul>

            <div class="logout">
                <span>Logout</span>
            </div>
        </nav>

    <!-- MAIN CONTENT -->
    <main class="content">

            <!-- TOP OPTIONS -->
            <div class="top-menu">
                <span class="top-option active">Create</span>
                <span class="top-option" onclick="window.location='absence.html'">Absence</span>
                <span class="top-option" onclick="window.location='view.html'">View</span>
                <span class="top-option">Data</span>
            </div>

            <!-- FORM SECTION -->
            <div class="form-container">

                    <h2>New Booking</h2>

        <form>
                <div class="course-row">
                        <label>Course</label>
                    <!-- Category Dropdown -->
                    <div class="dropdown-wrapper">
                        <button type="button" class="filter-btn" id="category-btn">Show All</button>
                        <div id="category-dropdown" class="dropdown hidden">
                            <div data-category="Math">Math</div>
                            <div data-category="Computer Science">Computer Science</div>
                            <div data-category="Biology">Biology</div>
                            <div data-category="Business">Business</div>
                            <div data-category="all">Show All</div>
                        </div>
                    </div>
                    <div class="autocomplete-input-wrapper">
                        <input type="text" id="course-code" class="course-code" placeholder="Course code">
                    </div>
                </div>

                <input type="text" placeholder="Course Name">

                    <label>Mentor</label>
                    <input type="text" placeholder="Select mentor">

                    <label>Date & Time</label>
                    <button type="button" id="open-calendar-btn" class="date-btn">
                        Select Date & Time
                    </button>

                    <!-- Hidden input to store the actual value -->
                    <input type="hidden" id="selected-datetime" name="selected-datetime">

                    <div id="student-1-block">

                        <!-- STUDENT INFO (same line) -->
                        <div class="student-row">
                            <div class="student-field">
                                <label>Student ID</label>
                                <input type="text" id="student-id" placeholder="Enter student ID">
                            </div>

                            <div class="student-field">
                                <label>Student Name</label>
                                <input type="text" id="student-name" placeholder="Enter student name">
                            </div>
                        </div>

                        <!-- EMAIL + PHONE (must also be in a student-row) -->
                        <div class="student-row">
                            <div class="student-field">
                                <label>Email</label>
                                <input type="email" id="student-email" placeholder="Enter email">
                            </div>

                            <div class="student-field">
                                <label>Phone Number</label>
                                <input type="text" id="student-phone" placeholder="Enter phone number">
                            </div>
                        </div>

                    </div>

                    <!-- Extra students will be added here -->
                    <div id="extra-students"></div>

                    <!-- SINGLE OR GROUP -->
                    <label>Single or Group</label>
                    <div class="single-group-wrapper">

                        <div class="radio-wrapper">
                            <label class="radio-option">
                                <input type="radio" name="session-type" value="single" checked>
                                Single
                            </label>

                            <label class="radio-option group-option">
                                <input type="radio" name="session-type" value="group">
                                Group
                            </label>
                        </div>

                        <div id="group-size-container" class="group-counter hidden">
                            <button type="button" id="group-decrease">−</button>
                            <span id="group-size">2</span>
                            <button type="button" id="group-increase">+</button>
                        </div>

                    </div>

                    <label>Location</label>
                    <input list="location" placeholder="Enter location">
                    <datalist id="location">
                        <option value="CUA (Library 2nd Floor)">
                        <option value="Online (Microsoft Teams)">
                        <option value="PC & Mac Lab (C234-C235)">
                        <option value="Grad. Department Office (Old)">
                    </datalist>

                    <label>Topics to Discuss</label>
                    <textarea rows="3" placeholder="Enter topics"></textarea>

                    <label>Professor</label>
                    <input type="text" placeholder="Enter professor">

                    <label>Person Who Made the Citation</label>
                    <input type="text" placeholder="Enter name">

                    <button type="submit">Submit</button>
        </form>
            </div>
                <!-- FOOTER -->
            <footer class="footer">

            </footer>
    </main>

    </div>

    <div id="calendar-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="close-calendar">&times;</span>

        <div id="confirm-selection" class="modal hidden">
            <div class="modal-content small">
                <p id="confirm-text"></p>
                <div class="confirm-actions">
                    <button id="confirm-yes">Confirm</button>
                    <button id="confirm-no">Cancel</button>
                </div>
            </div>
    </div>

            
<div id="calendar-ui-container" class="modal-calendar">
    <div class="mentor-tabs">
                <button class="mentor-tab active" data-mentor="1">Mentor 1</button>
                <button class="mentor-tab" data-mentor="2">Mentor 2</button>
                <button class="mentor-tab" data-mentor="3">Mentor 3</button>
            </div>

            <div class="mentor-layout">

            <!-- RIGHT COLUMN: CALENDAR -->
            <div class="calendar-container">
                <div class="calendar-header">
                    <div class="nav-buttons">
                    <button class="nav-btn" id="prev-month"><i class="fas fa-chevron-left"></i></button>
                    <button class="nav-btn" id="next-month"><i class="fas fa-chevron-right"></i></button>
                    </div>
                    <div class="month-year" id="month-year">September 2025</div>
                </div>
                
                <div class="weekdays">
                    <div class="weekday">Sun</div>
                    <div class="weekday">Mon</div>
                    <div class="weekday">Tue</div>
                    <div class="weekday">Wed</div>
                    <div class="weekday">Thu</div>
                    <div class="weekday">Fri</div>
                    <div class="weekday">Sat</div>
                </div>

                <div class="days" id="days"></div>
                
                <div class="calendar-footer">
                    <button class="today-btn" id="today-btn"><i class="fas fa-calendar-day"></i> Today</button>
                    <div class="event-indicator">
                    <i class="fas fa-circle" style="color: var(--accent); font-size: 0.6rem;"></i>
                    <span>Has events</span>
                    </div>
                </div>
                </div>

                <!-- Event Panel -->
                <div class="event-panel" id="event-panel">
                    <div class="event-header">
                        <div class="event-date" id="event-date">Select a date</div>
                        <i class="fas fa-calendar-alt event-icon"></i>
                    </div>
                    <div class="event-list" id="event-list">
                        <div class="no-events">Select a date with events to view them here</div>
                    </div>
                </div>

            </div>
        </div>
    </div>

</div>

<script src="Scripts/Calendar.js"></script>
<script src="Scripts/Autocomplete.js"></script>
<script src="Scripts/IndexUI.js"></script>

</body>
</html>
