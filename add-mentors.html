<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUA Bookings</title>
    <!--<link rel="stylesheet" href="styles.css">-->
    <link rel="stylesheet" href="CSS/base.css">
    <link rel="stylesheet" href="CSS/mentors-details.css">
    <link rel="stylesheet" href="CSS/add-mentors.css">
</head>
<body>

    <div class="container">

        <!-- LEFT NAVIGATION -->
        <nav class="sidebar">
            <h2 class="logo">CUA Bookings</h2>

            <ul class="nav-links">
                <li onclick="window.location='index.html'">Bookings</li>
                <li onclick="window.location='courses.html'">Courses</li>
                <li class="active" onclick="window.location='mentors.html'">Mentors</li>
                <li>Account</li>
            </ul>

            <div class="logout">
                <span>Logout</span>
            </div>
        </nav>

        <!-- MAIN CONTENT -->
        <main class="content">

        <div class="back-container">
            <button class="back-btn" onclick="window.location='mentors.html'">
            ← Back to Mentors
            </button>
        </div>

    <section class="add-course">

        <h1 class="form-title">Add New Mentor</h1>

        <form id="mult-form" class="course-form" method="post" action="">

        <div class="form-step">

        <div class="form-group">
            <!-- Mentor ID -->
                <label for="course-code">Mentor ID</label>
                <input type="text" id="course-code" placeholder="e.g., A00123456" oninput="this.className = ''">
        </div>
        <br>

        <div class="form-group">
            <!-- Mentor Name -->
                <label for="course-name">Mentor Name</label>
                <input type="text" id="course-name" placeholder="e.g., John Doe" oninput="this.className = ''">
        </div>
        <br>

        <div class="form-group">
            <!-- Contact -->
                <label for="course-professors">Contact</label>
                <input type="text" id="course-professors" placeholder="e.g., jodo3456@agu.inter.edu" oninput="this.className = ''">
        </div>
        <br>

        <div class="form-group">
            <!-- Schedule (Dynamic List) -->
                <label>Schedule</label>

                <ul class="topics-list">
                    <li><label for="course-professors">Monday&emsp;&emsp;</label><input type="text" placeholder="Start Shift" oninput="this.className = ''"> - <input type="text" placeholder="End Shift" oninput="this.className = ''">
                    <button type="button" class="add-topic-btn" onclick="addShift(this)">+ Add Shift</button>
                </li>
                    <li><label for="course-name">Tuesday&emsp;&emsp;</label><input type="text" placeholder="Start Shift" oninput="this.className = ''"> - <input type="text" placeholder="End Shift" oninput="this.className = ''">
                        <button type="button" class="add-topic-btn" onclick="addShift(this)">+ Add Shift</button>
                    </li>
                    <li><label for="course-code">Wednesday&emsp;&emsp;</label><input type="text" placeholder="Start Shift" oninput="this.className = ''"> - <input type="text" placeholder="End Shift" oninput="this.className = ''">
                        <button type="button" class="add-topic-btn" onclick="addShift(this)">+ Add Shift</button>
                    </li>
                    <li><label for="course-professors">Thursday&emsp;&emsp;</label><input type="text" placeholder="Start Shift" oninput="this.className = ''"> - <input type="text" placeholder="End Shift" oninput="this.className = ''">
                        <button type="button" class="add-topic-btn" onclick="addShift(this)">+ Add Shift</button>
                    </li>
                    <li><label for="course-name">Friday&emsp;&emsp;</label><input type="text" placeholder="Start Shift" oninput="this.className = ''"> - <input type="text" placeholder="End Shift" oninput="this.className = ''">
                        <button type="button" class="add-topic-btn" onclick="addShift(this)">+ Add Shift</button>
                    </li>
                </ul>
        </div>
        </div>

        <!-- Mentor Selection (Checkbox List) -->
        <div class="form-step">
            <div class="form-group">
                <label>Select Categories</label>

                <div class="mentor-checkboxes">
                    <label><input type="checkbox" value="Mentor 1"> Math </label>
                    <label><input type="checkbox" value="Mentor 2"> Science </label>
                    <label><input type="checkbox" value="Mentor 3"> English </label>
                </div>

                <small class="hint">Select all categories that the mentor will teach.</small>
            </div>
        </div>

        <!-- Submit -->
            <div style="overflow:auto;">
                <div style="float:right;">
                    <button type="button" class="prev-btn" id="prevBtn" onclick="nextPrev(-1)">Previous</button>
                    <button type="button" class="submit-btn" id="nextBtn" onclick="nextPrev(1)">Next</button>
                </div>
            </div>
            
        </form>
    </section>

                <!-- FOOTER -->
            <footer class="footer">
                
            </footer>
        </main>

    </div>

<script>
var currentTab = 0; // Current tab is set to be the first tab (0)
showTab(currentTab); // Display the current tab

function showTab(n) {
  // This function will display the specified tab of the form...
  var x = document.getElementsByClassName("form-step");
  x[n].style.display = "block";
  //... and fix the Previous/Next buttons:
  if (n == 0) {
    document.getElementById("prevBtn").style.display = "none";
  } else {
    document.getElementById("prevBtn").style.display = "inline";
  }
  if (n == (x.length - 1)) {
    document.getElementById("nextBtn").innerHTML = "Submit";
  } else {
    document.getElementById("nextBtn").innerHTML = "Next";
  }
}

function nextPrev(n) {
  // This function will figure out which tab to display
  var x = document.getElementsByClassName("form-step");
  // Exit the function if any field in the current tab is invalid:
  if (n == 1 && !validateForm()) return false;
  // Hide the current tab:
  x[currentTab].style.display = "none";
  // Increase or decrease the current tab by 1:
  currentTab = currentTab + n;
  // if you have reached the end of the form...
  if (currentTab >= x.length) {
    // ... the form gets submitted:
    document.getElementById("mult-form").submit();
    return false;
  }
  // Otherwise, display the correct tab:
  showTab(currentTab);
}

function addShift(button) {
  var li = button.closest('li');
  var shiftGroup = document.createElement('span');
  shiftGroup.className = 'shift-group';
  shiftGroup.innerHTML = ' <input type="text" placeholder="Start Shift" oninput="this.className = \'\'"> - <input type="text" placeholder="End Shift" oninput="this.className = \'\'">';
  li.insertBefore(shiftGroup, button);
  button.innerHTML = '- Remove Shift';
  button.onclick = function() { removeShift(this); };
}

function removeShift(button) {
  var shiftGroup = button.previousElementSibling;
  if (shiftGroup && shiftGroup.className === 'shift-group') {
    shiftGroup.remove();
  }
  button.innerHTML = '+ Add Shift';
  button.onclick = function() { addShift(this); };
}

function validateForm() {
  // This function deals with validation of the form fields
  var x, y, i, valid = true;
  x = document.getElementsByClassName("form-step");
  y = x[currentTab].getElementsByTagName("input");
  // A loop that checks every input field in the current tab:
  for (i = 0; i < 3 && i < y.length; i++) {
    // If a field is empty...
    if (y[i].value == "") {
      // add an "invalid" class to the field:
      y[i].className += " invalid";
      // and set the current valid status to false
      valid = false;
    }
  }
  return valid; // Add this return statement
}
</script>
    
</body>
</html>
