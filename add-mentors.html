<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUA Bookings</title>
    <!--<link rel="stylesheet" href="styles.css">-->
    <link rel="stylesheet" href="CSS/base.css">
    <link rel="stylesheet" href="CSS/mentors.css">
    <link rel="stylesheet" href="CSS/mentors-details.css">
    <link rel="stylesheet" href="CSS/add-mentors.css">
</head>
<body>

    <div class="container">

        <!-- LEFT NAVIGATION -->
        <nav class="sidebar">
            <h2 class="logo">CUA Bookings</h2>

            <ul class="nav-links">
                <li onclick="window.location='index.html'">Bookings</li>
                <li onclick="window.location='courses.html'">Courses</li>
                <li class="active" onclick="window.location='mentors.html'">Mentors</li>
                <li>Account</li>
            </ul>

            <div class="logout">
                <span>Logout</span>
            </div>
        </nav>

        <!-- MAIN CONTENT -->
        <main class="content">

        <div class="back-container">
            <button class="back-btn" onclick="window.location='mentors.html'">
            ← Back to Mentors
            </button>
        </div>

    <section class="add-mentor">

        <h1 class="form-title">Add New Mentor</h1>

        <form class="mentor-form" method="post" action="">

        <div class="form-group">
            <!-- Mentor ID -->
                <label for="mentor-id">Mentor ID</label>
                <input type="text" id="mentor-id" placeholder="e.g., A00123456" oninput="this.className = ''">
        </div>

        <div class="form-group">
            <!-- Mentor Name -->
                <label for="mentor-name">Mentor Name</label>
                <input type="text" id="mentor-name" placeholder="e.g., John Doe" oninput="this.className = ''">
        </div>

        <div class="form-group">
            <!-- Contact -->
                <label for="contact">Contact</label>
                <input type="text" id="contact" placeholder="e.g., jodo3456@agu.inter.edu" oninput="this.className = ''">
        </div>

        <div class="form-group">
            <!-- Schedule (Dynamic List) -->
                <label>Schedule</label>

                <ul class="schedule">
                    <li><label for="day-of-week">Monday&emsp;&emsp;</label><input type="text" placeholder="Start Shift" oninput="this.className = ''"> 
                        <select>
                            <option>AM</option>
                            <option>PM</option>
                        </select> - <input type="text" placeholder="End Shift" oninput="this.className = ''"> 
                        <select>
                            <option>AM</option>
                            <option>PM</option>
                        </select>
                    <button type="button" class="add-shift-btn" onclick="addShift(this)">+ Add Shift</button>
                </li>
                    <li><label for="day-of-week">Tuesday&emsp;&emsp;</label><input type="text" placeholder="Start Shift" oninput="this.className = ''"> 
                        <select>
                            <option>AM</option>
                            <option>PM</option>
                        </select> - <input type="text" placeholder="End Shift" oninput="this.className = ''"> 
                        <select>
                            <option>AM</option>
                            <option>PM</option>
                        </select>
                        <button type="button" class="add-shift-btn" onclick="addShift(this)">+ Add Shift</button>
                    </li>
                    <li><label for="day-of-week">Wednesday&emsp;&emsp;</label><input type="text" placeholder="Start Shift" oninput="this.className = ''"> 
                        <select>
                            <option>AM</option>
                            <option>PM</option>
                        </select> - <input type="text" placeholder="End Shift" oninput="this.className = ''"> 
                        <select>
                            <option>AM</option>
                            <option>PM</option>
                        </select>
                        <button type="button" class="add-shift-btn" onclick="addShift(this)">+ Add Shift</button>
                    </li>
                    <li><label for="day-of-week">Thursday&emsp;&emsp;</label><input type="text" placeholder="Start Shift" oninput="this.className = ''"> 
                        <select>
                            <option>AM</option>
                            <option>PM</option>
                        </select> - <input type="text" placeholder="End Shift" oninput="this.className = ''"> 
                        <select>
                            <option>AM</option>
                            <option>PM</option>
                        </select>
                        <button type="button" class="add-shift-btn" onclick="addShift(this)">+ Add Shift</button>
                    </li>
                    <li><label for="day-of-week">Friday&emsp;&emsp;</label><input type="text" placeholder="Start Shift" oninput="this.className = ''"> 
                        <select>
                            <option>AM</option>
                            <option>PM</option>
                        </select> - <input type="text" placeholder="End Shift" oninput="this.className = ''"> 
                        <select>
                            <option>AM</option>
                            <option>PM</option>
                        </select>
                        <button type="button" class="add-shift-btn" onclick="addShift(this)">+ Add Shift</button>
                    </li>
                </ul>
        </div>

                <!-- Mentor Selection (Checkbox List) -->
        <div class="form-group">
            <label>Select Courses</label>

            <div class="courses-controls">

                <!-- Select All -->
                <label class="select-all">
                    <input type="checkbox" id="select-all-courses">
                    Select All
                </label>

                <!-- Search -->
                <input type="text" id="course-search" placeholder="Search courses..." class="course-search">

                <!-- Category Dropdown -->
                <div class="dropdown-wrapper">
                    <button type="button" id="category-btn">Show All</button>
                    <div id="category-dropdown" class="dropdown hidden">
                        <div data-category="all">Show All</div>
                        <div data-category="Math">Math</div>
                        <div data-category="Computer Science">Computer Science</div>
                        <div data-category="Biology">Biology</div>
                        <div data-category="Business">Business</div>
                    </div>
                </div>
            </div>


                <div class="courses-checkboxes">
                    <!-- Courses added by script -->
                </div>

                <small class="hint">Select all courses that the mentor will teach.</small>
        </div>

        <!-- Submit -->
        <button type="submit" class="submit-btn" id="submit-btn">Submit</button>

        </form>
    </section>

                <!-- FOOTER -->
            <footer class="footer">
                
            </footer>
        </main>

    </div>

<script>
document.addEventListener("DOMContentLoaded", () => {

    /* ============================
       COURSE CHECKBOX COLUMNS
    ============================ */
    const courseContainer = document.querySelector(".courses-checkboxes");

    const courses = [
        { code: "COMP 101", name: "Introduction to Computer Science", categories: ["Computer Science"] },
        { code: "MATH 101", name: "Calculus I", categories: ["Math"] },
        { code: "BIO 101", name: "General Biology", categories: ["Biology"] },
        { code: "BUS 101", name: "Introduction to Business", categories: ["Business"] }
    ];

    for (let i = 0; i < courses.length; i += 6) {
        const column = document.createElement("div");
        column.classList.add("course-column");

        courses.slice(i, i + 6).forEach(course => {
            const label = document.createElement("label");
            label.dataset.code = course.code;
            label.dataset.name = course.name;
            label.dataset.categories = course.categories.join(",");
            label.innerHTML = `
                <input type="checkbox" value="${course.code}">
                ${course.code} - ${course.name}
            `;
            column.appendChild(label);
        });

        courseContainer.appendChild(column);
    }

    // Setup search and category filtering
    setupSearchAndFilter();

    // Setup form submission
    document.querySelector('.mentor-form').addEventListener('submit', function(e) {
        e.preventDefault();
        if (validateForm()) {
            // Handle form submission here
            alert('Mentor added successfully!');
            // You can add code to save data, redirect, etc.
        }
    });
});

function addShift(button) {
    var li = button.closest('li');
    var shiftGroup = document.createElement('span');
    shiftGroup.className = 'shift-group';
    shiftGroup.innerHTML = ' <input type="text" placeholder="Start Shift" oninput="this.className = \'\'"> <select><option>AM</option><option>PM</option></select> - <input type="text" placeholder="End Shift" oninput="this.className = \'\'"> <select><option>AM</option><option>PM</option></select>';
    li.insertBefore(shiftGroup, button);
    button.innerHTML = '×';
    button.classList.add('remove-shift-btn');
    button.onclick = function() { removeShift(this); };
}

function removeShift(button) {
    var shiftGroup = button.previousElementSibling;
    if (shiftGroup && shiftGroup.className === 'shift-group') {
        shiftGroup.remove();
    }
    button.innerHTML = '+ Add Shift';
    button.classList.remove('remove-shift-btn');
    button.onclick = function() { addShift(this); };
}

function validateForm() {
    let valid = true;
    const mentorId = document.getElementById('mentor-id');
    const mentorName = document.getElementById('mentor-name');
    const contact = document.getElementById('contact');
    
    // Reset previous invalid classes
    [mentorId, mentorName, contact].forEach(field => field.classList.remove('invalid'));
    
    // Check required fields
    if (!mentorId.value.trim()) {
        mentorId.classList.add('invalid');
        valid = false;
    }
    if (!mentorName.value.trim()) {
        mentorName.classList.add('invalid');
        valid = false;
    }
    if (!contact.value.trim()) {
        contact.classList.add('invalid');
        valid = false;
    }
    
    // Check if at least one course is selected
    const selectedCourses = document.querySelectorAll('.courses-checkboxes input[type="checkbox"]:checked');
    if (selectedCourses.length === 0) {
        alert('Please select at least one course.');
        valid = false;
    }
    
    return valid;
}

function setupSearchAndFilter() {
    const searchInput = document.getElementById('course-search');
    const categoryBtn = document.getElementById('category-btn');
    const categoryDropdown = document.getElementById('category-dropdown');
    const selectAllCheckbox = document.getElementById('select-all-courses');
    
    // Search functionality
    searchInput.addEventListener('input', filterCourses);
    
    // Category dropdown
    categoryBtn.addEventListener('click', () => {
        categoryDropdown.classList.toggle('hidden');
    });
    
    categoryDropdown.addEventListener('click', (e) => {
        if (e.target.dataset.category) {
            categoryBtn.textContent = e.target.textContent;
            categoryDropdown.classList.add('hidden');
            filterCourses();
        }
    });
    
    // Select all functionality
    selectAllCheckbox.addEventListener('change', (e) => {
        const checkboxes = document.querySelectorAll('.courses-checkboxes input[type="checkbox"]');
        checkboxes.forEach(cb => cb.checked = e.target.checked);
    });
    
    // Close dropdown when clicking outside
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.dropdown-wrapper')) {
            categoryDropdown.classList.add('hidden');
        }
    });
}

function filterCourses() {
    const searchTerm = document.getElementById('course-search').value.toLowerCase();
    const selectedCategory = document.getElementById('category-btn').textContent.toLowerCase();
    const labels = document.querySelectorAll('.courses-checkboxes label');
    
    labels.forEach(label => {
        const courseCode = label.dataset.code.toLowerCase();
        const courseName = label.dataset.name.toLowerCase();
        const categories = label.dataset.categories.toLowerCase();
        const matchesSearch = courseCode.includes(searchTerm) || courseName.includes(searchTerm);
        const matchesCategory = selectedCategory === 'show all' || categories.includes(selectedCategory);
        
        label.style.display = (matchesSearch && matchesCategory) ? '' : 'none';
    });
}

</script>
    
</body>
</html>
